<div class="admin-section">
  <h2>Управление контактами</h2>
  
  <form (ngSubmit)="saveContacts()">
    <div class="form-group">
      <label>Телефон:</label>
      <input 
        [(ngModel)]="contacts.phone" 
        name="phone" 
        class="form-control"
        (input)="onFieldChange()">
    </div>
    
    <div class="form-group">
      <label>Email:</label>
      <input 
        [(ngModel)]="contacts.email" 
        name="email" 
        class="form-control"
        (input)="onFieldChange()">
    </div>
    
    <div class="form-group">
      <label>Адрес офиса:</label>
      <textarea 
        [(ngModel)]="contacts.office" 
        name="office" 
        class="form-control" 
        rows="3"
        (input)="onFieldChange()"></textarea>
    </div>
    
    <div class="form-group">
      <label>Часы работы:</label>
      <input 
        [(ngModel)]="contacts.workingHours" 
        name="workingHours" 
        class="form-control"
        (input)="onFieldChange()">
    </div>
  
    <h3>Социальные сети</h3>
    
    <!-- БЫСТРОЕ ИСПРАВЛЕНИЕ: Используем track по индексу -->
    @for (social of contacts.social; track socialTrackBy($index, social); let i = $index) {
      <div class="social-item">
        <div class="row">
          <div class="col">
            <label>Название</label>
            <input 
              [(ngModel)]="social.name" 
              [name]="'social-name-' + i" 
              class="form-control" 
              placeholder="Instagram, Facebook, VK..."
              (input)="onFieldChange()">
          </div>
          <div class="col">
            <label>Иконка</label>
            <input 
              [(ngModel)]="social.icon" 
              [name]="'social-icon-' + i" 
              class="form-control" 
              placeholder="IN, FB, VK..."
              (input)="onFieldChange()">
          </div>
          <div class="col">
            <label>Ссылка</label>
            <input 
              [(ngModel)]="social.url" 
              [name]="'social-url-' + i" 
              class="form-control" 
              placeholder="https://..."
              (input)="onFieldChange()">
          </div>
          <div class="col-auto">
            <label>&nbsp;</label>
            <button type="button" (click)="removeSocial(i)" class="btn btn-danger btn-sm">
              ×
            </button>
          </div>
        </div>
      </div>
    }
    
    <button type="button" (click)="addSocial()" class="btn btn-secondary" style="margin-top: 15px;">
      + Добавить соцсеть
    </button>
    
    <div class="form-actions">
      <button type="submit" 
          class="btn btn-success" 
          [disabled]="saveStatus === 'loading' || !hasUnsavedChanges">
    Сохранить контакты
  </button>
    </div>
  </form>
</div>
